name: CS - Security Scan

on:
    push:
        branches: [main, dev, "features/**"]
    pull_request:
        branches: [main, dev]

jobs:
    dependency-audit:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci
              
            - name: Run npm audit
              run: npm audit --audit-level=high